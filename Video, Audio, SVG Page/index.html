<!DOCTYPE HTML>
<html lang =en>
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale= 1.0">
        <title> All about Media </title>
    </head>
    <body>
        <!-- Using all the attributes of Video, Audio, SVG, & iframe.-->
        <h2> Video </h2>
        <br>
        <video src = "video.mp4" height = "255"  autoplay loop muted controls poster="download.jpg"> </video>

        <h2> Audio </h2>

        <audio src = "sachin.mp3" height = "200" autoplay loop muted controls preload="auto" ></audio>

        <h2> SVG </h2>

        <img src="img.svg" alt="Svg">

        <h2> iframe embedding Website </h2>

        <iframe src="https://archive.codewithharry.com/tutorial/html-home/" width="833" height="444"></iframe>

        <h2> iframe Embedding YouTube Video</h2>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=-sOP7_93VIuehpok&amp;start=758" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </body>
</html>
