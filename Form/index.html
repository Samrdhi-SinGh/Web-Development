<!DOCTYPE HTML>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content ="width = device-width, initial-scale =1.0">
        <title> Form </title>
    </head>
    <body>

        <h1> Form </h1>

        <form action="post">
            
            <div>
                <!--In 'text', we only write texts.-->
            <label for = "username"> Enter your username : </label>
            <input type ="text" id="username" name = "username" placeholder="Enter your username" autofocus> 
            <!--'autofocus' is used to have cursor on it everytime the sites open.-->
            </div>

            <div>
                <!--'email' is used to have email.-->
                <label for = "email"> Enter your Email : </label>
                <input type="email" id ="email" name ="Email" placeholder="Email">
            </div>

            <div>
                <!--'password' is used to have password.-->
                <label for = "password"> Enter Password : </label>
                <input type="password" id ="password" name ="Password" placeholder="Password">
            </div>

           <div>
                <!-- 'radio' is used for selecting one option at a time.-->
            <input type = "radio" id="male" name ="gender" value ="male">
            <lable for ="male"> Male </lable>
            <input type="radio" id="female" name="gender" value="female">
            <label for = "female"> Female </label>
            </div>

            <div>
                <!-- Use 'checkbox' for to click the box with check sign.-->
                <input type = "checkbox" id="Check" name = "Checking" value ="Yes">
                <label for ="Check"> Check the box</label>
            </div>

            <div>
                <!-- 'textarea' are used to have space to type anything by user.-->
                <label for = "Comments"> Enter comment here : </label>
                <br> 
                <textarea id ="Comments" name = "Comment" rows="3" cols="40"></textarea>
            </div>

            <div>
                <!-- 'select' is used to select in the dropdown options.-->
                 <label for="course"> Course : </label>
                 <select name="Course" id="course" >
                    <option value="B.Tech"> B.Tech</option>
                    <option value="B.Com"> B.Com</option>
                    <option value="BA"> BA</option>
                </select>

            </div>
        </form>
    </body>

</html>
