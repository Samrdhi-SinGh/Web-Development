<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-Design</title>
    <style>
        * {
            margin: 6px;
            padding: 0px;
        }

        .mainbox {
            border: 2px solid rgb(246, 240, 240);
            width: 545px;
            height: 850px;
            border-radius: 21px;
            box-shadow: 0px 0px 5px 0px gray;
        }

        img {
            /* Element Selector*/
            border-radius: 23px;
            margin-bottom: 13px;
        }

        .nature{
            border: 2px solid gray;
            border-radius: 50px;
            display: inline-flex;
            font-size: 24px;
            color: gray;
            margin-left: 31px;
            width: 85px;
            padding: 1px;
            justify-content: center;
        }

        .lake{
            border: 2px solid gray;
            border-radius: 50px;
            display: inline-flex;
            font-size: 24px;
            color: gray;
            width: 80px;
            padding: 1px;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="mainbox">
        <div class="image"><img
                src="https://images.unsplash.com/photo-1722925406683-d5e4090e6d96?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8cGVhY2VmdWwlMjBuaWdodHxlbnwwfHwwfHx8MA%3D%3D"
                alt="Peaceful night picture" width="520px" height="390px">
        </div>

        <div class="nature">
            Nature 
            <!-- Button like structure but not a button. -->
        </div>

         <div class="lake">
            Lake
        </div>
    </div>
</body>

</html>
