<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Document </title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .box{
            border: 2px solid black;
            /*display: inline ;  It will make the block element work as an inline element.*/
            display: inline-block ; /* TO apply margin and padding and width. We need to use inline-block or nothing eill happen.*/
            padding: 45px;
            margin: 34px;
            width: 344px;
        }

    </style>
</head>
<body>

    <div class = "box">
        I made a box.
    </div>
    <div class="box"> With border.</div>

    <span>I am learning.</span>
    
</body>
</html>
