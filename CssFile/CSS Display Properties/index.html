<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units in Web dev</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .box{
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 1160px; */
            width : 80vw;
            margin: auto;  
            /* This is used to take the Element to the center. And it only works on Block elements. It applies margin on both left and right side.*/
            height: 20vh;
             /*vh gives the height to the element in any device, any ssize..*/
            background-color:cadetblue;
        }

        .box1{
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 1160px; */
            width : 80vw;
            margin: 23px auto; /*The 23px will be applied on top and bottom in margin and auto will be applied in left and right side.*/ 
            height: 50vh;
            /*vh gives the height to the element in any device, any size..*/
            font-size:18px;
            background-color:cadetblue;
        }

        .box1 p{
            font-size: 2em; /* Paragraph will have 36px size font as 2em will be multiplied by the inherited font-size in box1 18px.*/
        }

    </style>
</head>
<body>
    <!--Units :-
        1. px :- It's a unit 'Pixel'. It has 196 off an inch.
        2. vw :- vw is 'Viewport'. It works according to how much the viewport is.
        3. vh :- vh is 'Viewport Height'.
        4.em :- em is used to multiple the font size inherited.
    -->

    <div class="box">
        This is a box.
    </div>

    <div class="box1">

        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. At quasi hic animi?</p>
        
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Sint unde, tenetur praesentium sunt, modi aperiam placeat quas dignissimos dolorum reprehenderit voluptas maiores nulla.</div>


</body>
</html>
