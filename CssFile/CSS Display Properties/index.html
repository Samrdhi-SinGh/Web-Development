<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units in Web dev</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .box{
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 1160px; */
            width : 80vw;
            margin: auto;  
            /* This is used to take the Element to the center. And it only works on Block elements. It applies margin on both left and right side.*/
            background-color:cadetblue;
        }

    </style>
</head>
<body>
    <!--Units :-
        1. px :- It's a unit 'Pixel'. It has 196 off an inch.
        2. vw :- vw is 'Viewport'. It works according to how much the viewport is.
    -->

    <div class="box">
        This is a box.
    </div>
</body>
</html>
