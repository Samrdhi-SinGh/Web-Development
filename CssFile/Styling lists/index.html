<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling List with CSS</title>
    <style>
        .navbar{
            margin:1px;
            padding:1px;
            border: 2px solid purple;

        }

        .box{
            display: inline;
        }
    </style>
</head>
   <!-- Lists have display: list-item.
         And each <li> Have a 'marker'  and a 'content' written inside the <li>. And that's all given to list because of list-item.
         
        'marker' :- It the pointer in circle , square, or any shape     which representsd the content of list.
    -->
<body>
    <nav class="navbar">
        <ul>
            <li class="box">Home</li>
            <li class="box">About</li>
            <li class="box">Contact</li>
        </ul>
    </nav>
</body>
</html>
