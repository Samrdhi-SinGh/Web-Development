<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style> 
    div {
        color : green; 
        background-color: yellow;
    }
    </style>
</head>
<body>

<!-- Inline CSS is used in this file.-->

    <div>
        <h2>
        The very first folder containing CSS. <!--The color of characters will turn green as 'color' is used. And the background color of this lie only will turn yellow.-->
        </h2>
    </div>

    <span>
        <h2>
            The style will not work on the &lt;span&gt; as it's not given in style tag.
        </h2>
    </span>

</body>
</html>
