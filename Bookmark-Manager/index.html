<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark - Manager</title>
</head>
<body>
    <h1> My Bookmarks </h1>
    <h2> Primary Bookmarks </h2>

    <p><a  href ="https://google.com" >Open Google</a></p> <!-- Here we didnt wrote target_blank thatsd why when we will open google link it will automatically open itself into the bookmark tab instead of anther new tab.-->
    <p><a target="_balnk" href ="https://github.com" >Open GitHub</a></p>
    <p><a target="_balnk" href ="https://whatsapp.com" >Open Whatsapp </a></p>
    <p><a target="_balnk" href ="https://youtube.com" >Open YouTube</a></p>
    <p><a target="_balnk" href ="https://leetcode.com" >Open LeetCode </a></p>

    <!-- We used Paragraph tag <p> here to have all links in different lines. And we used target here to have the links open in same window with just another tab in it. -->

    <h2> Secondary Bookmarks </h2>

    <p><a target="_balnk" href="https://facebook.com">Open Facebook</a></p>
    <p><a target="_balnk" href="https://chatgpt.com">Open ChatGpt</a></p>
    
</body>
</html>
